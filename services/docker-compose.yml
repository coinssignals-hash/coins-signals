# =============================================================================
# Trading Signals Platform - Docker Compose
# =============================================================================
# Stack: FastAPI (API + Realtime + Worker) + TimescaleDB + Redis
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB
  # ---------------------------------------------------------------------------
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: trading_signals_db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-trading_signals}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading} -d ${POSTGRES_DB:-trading_signals}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - trading_network

  # ---------------------------------------------------------------------------
  # Redis - Cache & Pub/Sub
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: trading_signals_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - trading_network

# =============================================================================
# Volumes - Persistent Storage
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  trading_network:
    driver: bridge
    name: trading_signals_network
