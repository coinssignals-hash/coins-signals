version: '3.8'

services:
  api:
    build: .
    restart: always
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=${CORS_ORIGINS:-https://tudominio.com}
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    # No exponer puertos al exterior en producción

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
